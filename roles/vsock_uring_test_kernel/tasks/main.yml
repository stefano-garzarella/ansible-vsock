---

- copy:
    src: vsock_uring_test
    dest: /tmp/vsock_uring_test
    mode: 0777
    force: no

- name: Run vsock_uring_test ({{ vsock_uring_test_repeat | default(1) }} iterations)
  include_tasks: run_test.yml
  loop: "{{ range(1, (vsock_uring_test_repeat | default(1) | int) + 1) | list }}"
  loop_control:
    loop_var: vsock_uring_test_iteration
