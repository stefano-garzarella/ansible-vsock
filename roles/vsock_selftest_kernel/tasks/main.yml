---

- copy:
    src: vsock_test
    dest: /tmp/vsock_test
    mode: 0777
    force: no

- copy:
    src: vmtest.sh
    dest: /tmp/vmtest.sh
    mode: 0777
    force: no

- name: Generate an OpenSSH keypair needed by vmtest
  community.crypto.openssh_keypair:
    path: /root/.ssh/id_rsa

- name: Set authorized key
  shell: "cat /root/.ssh/id_rsa >> /root/.ssh/authorized_keys"

- name: Disable key checking
  shell: |
    printf "Host *\n    StrictHostKeyChecking no\n" >> /root/.ssh/config

#- name: Set authorized key
#  ansible.posix.authorized_key:
#    user: root
#    state: present
#    key: "{{ lookup('file', '/root/.ssh/id_rsa.pub') }}"

- name: Start vmtest
  shell: "/tmp/vmtest.sh"
  register: vmtest_ret

- name: Display vmtest results
  when: vmtest_ret.stdout_lines | default([]) | length > 0
  debug:
    var: vmtest_ret.stdout_lines

- name: Display vmtest_ret warnings/errors
  when: vmtest_ret.stderr_lines | default([]) | length > 0
  debug:
    var: vmtest_ret.stderr_lines
